# SAM template for SailPoint UI Development Kit
AWSTemplateFormatVersion: 2010-09-09
Description: >-
  sailpoint-ui-development-kit - Angular app with Node.js serverless backend

Transform:
- AWS::Serverless-2016-10-31

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: 
      - dev
      - stage
      - prod
    Description: Environment for the deployment

Resources:
  # API Gateway for the backend services
  UiDevKitApiGateway:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowMethods: 
          - "OPTIONS"
          - "GET"
          - "POST"
          - "PUT"
          - "PATCH" 
          - "DELETE"
        AllowHeaders: 
          - "Content-Type"
          - "Authorization"
          - "x-csrf-token"
        AllowOrigins:
          - "*"
      DefaultRouteSettings:
        DetailedMetricsEnabled: true
        ThrottlingBurstLimit: 100
        ThrottlingRateLimit: 50

  # Lambda function for the web API backend
  UiDevKitBackendFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: server/
      Handler: lambda-handler.handler
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      MemorySize: 512
      Timeout: 30
      Description: Backend API for SailPoint UI Development Kit
      Environment:
        Variables:
          NODE_ENV: !Ref Environment
          CORS_ORIGIN: !Sub "https://${UiDevKitCloudFrontDistribution.DomainName}"
      Events:
        # Catch-all API routes
        ApiProxy:
          Type: HttpApi
          Properties:
            Path: /api/{proxy+}
            Method: ANY
            ApiId: !Ref UiDevKitApiGateway
        ApiRoot:
          Type: HttpApi
          Properties:
            Path: /api
            Method: ANY
            ApiId: !Ref UiDevKitApiGateway

  # S3 Bucket for hosting the Angular web app
  UiDevKitWebSiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "sailpoint-ui-dev-kit-${Environment}-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html  # SPA routing support
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  # S3 Bucket Policy for CloudFront access
  UiDevKitWebSiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UiDevKitWebSiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
        - Sid: "AllowCloudFrontServicePrincipal"
          Effect: "Allow"
          Principal:
            Service: "cloudfront.amazonaws.com"
          Action: "s3:GetObject"
          Resource: !Sub "${UiDevKitWebSiteBucket}/*"
          Condition:
            StringEquals:
              "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${UiDevKitCloudFrontDistribution}"
        - Sid: "PublicReadGetObject"
          Effect: "Allow"
          Principal: "*"
          Action: "s3:GetObject"
          Resource: !Sub "${UiDevKitWebSiteBucket}/*"

  # Origin Access Control for CloudFront
  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-OAC"
        OriginAccessControlOriginType: "s3"
        SigningBehavior: "always"
        SigningProtocol: "sigv4"

  # CloudFront Distribution for the web app
  UiDevKitCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
        # S3 Origin for the Angular app
        - DomainName: !GetAtt UiDevKitWebSiteBucket.RegionalDomainName
          Id: "UiDevKitS3Origin"
          S3OriginConfig:
            OriginAccessIdentity: ""
          OriginAccessControlId: !Ref CloudFrontOriginAccessControl
        # API Gateway origin for backend calls
        - DomainName: !Sub "${UiDevKitApiGateway}.execute-api.${AWS::Region}.amazonaws.com"
          Id: "UiDevKitApiOrigin"
          CustomOriginConfig:
            OriginProtocolPolicy: "https-only"
            OriginSSLProtocols: 
              - "TLSv1.2"
        Enabled: true
        DefaultRootObject: "index.html"
        HttpVersion: "http2"
        DefaultCacheBehavior:
          AllowedMethods: ["DELETE", "GET", "HEAD", "OPTIONS", "PATCH", "POST", "PUT"]
          CachedMethods: ["GET", "HEAD"]
          TargetOriginId: "UiDevKitS3Origin"
          ViewerProtocolPolicy: "redirect-to-https"
          CachePolicyId: "658327ea-f89d-4fab-a63d-7e88639e58f6"  # Managed-CachingOptimized
          Compress: true
        CacheBehaviors:
        # API routes should not be cached
        - PathPattern: "/api/*"
          TargetOriginId: "UiDevKitApiOrigin"
          ViewerProtocolPolicy: "redirect-to-https"
          AllowedMethods: ["DELETE", "GET", "HEAD", "OPTIONS", "PATCH", "POST", "PUT"]
          CachedMethods: ["GET", "HEAD"]
          CachePolicyId: "4135ea2d-6df8-44a3-9df3-4b5a84be39ad"  # Managed-CachingDisabled
          OriginRequestPolicyId: "88a5eaf4-2fd4-4709-b370-b4c650ea3fcf"  # Managed-CORS-S3Origin
        CustomErrorResponses:
        # Handle SPA routing
        - ErrorCode: 404
          ResponseCode: 200
          ResponsePagePath: "/index.html"
        - ErrorCode: 403
          ResponseCode: 200
          ResponsePagePath: "/index.html"
        PriceClass: "PriceClass_100"  # Use only North America and Europe
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

Outputs:
  WebsiteURL:
    Description: "CloudFront Distribution URL for the UI Development Kit"
    Value: !Sub "https://${UiDevKitCloudFrontDistribution.DomainName}"
    
  ApiGatewayURL:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${UiDevKitApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/"
    
  S3BucketName:
    Description: "S3 Bucket for hosting web frontend"
    Value: !Ref UiDevKitWebSiteBucket
    
  CloudFrontDistributionId:
    Description: "CloudFront Distribution ID"
    Value: !Ref UiDevKitCloudFrontDistribution
    
  ApiGatewayId:
    Description: "API Gateway ID"
    Value: !Ref UiDevKitApiGateway